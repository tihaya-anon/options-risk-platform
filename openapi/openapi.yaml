openapi: 3.1.0
info:
  title: Options Risk Platform API
  version: 0.1.0
  description: |
    Backend API for the options risk platform.
    The frontend should treat this contract as the canonical integration surface.

servers:
  - url: http://localhost:8787/api
    description: Local backend

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required: [ok, provider]
                properties:
                  ok:
                    type: boolean
                  provider:
                    type: string

  /config:
    get:
      operationId: getConfig
      summary: Runtime config
      responses:
        "200":
          description: Runtime config for frontend settings bootstrap
          content:
            application/json:
              schema:
                type: object
                required:
                  - provider
                  - defaultSymbol
                  - llmAdvisorMode
                  - providers
                  - advisorModes
                  - providerMetadata
                properties:
                  provider:
                    type: string
                  defaultSymbol:
                    type: string
                  llmAdvisorMode:
                    type: string
                  providers:
                    type: array
                    items:
                      type: string
                  advisorModes:
                    type: array
                    items:
                      type: string
                  providerMetadata:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderMetadata"

  /snapshot:
    get:
      operationId: getSnapshot
      summary: Enriched option snapshot
      parameters:
        - in: query
          name: symbol
          required: false
          schema:
            type: string
            default: SPY
        - in: query
          name: provider
          required: false
          schema:
            type: string
            default: mock
      responses:
        "200":
          description: Enriched snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichedSnapshotFile"

  /portfolio/analyze:
    post:
      operationId: analyzePortfolio
      summary: Analyze portfolio positions against a snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
      responses:
        "200":
          description: Portfolio analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResponse"

  /book/parse:
    post:
      operationId: parseBook
      summary: Parse a multi-asset book into normalized positions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookParseRequest"
      responses:
        "200":
          description: Parsed book snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookSnapshot"

  /risk-map:
    post:
      operationId: createRiskMap
      summary: Build a portfolio-level risk map from a normalized book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskMapRequest"
      responses:
        "200":
          description: Portfolio risk map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskMap"

  /hedge-lab/proposals:
    post:
      operationId: createHedgeProposals
      summary: Generate hedge proposals for a normalized book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HedgeLabRequest"
      responses:
        "200":
          description: Candidate hedge proposals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HedgeProposalResponse"

  /strategy-compare:
    post:
      operationId: compareStrategies
      summary: Compare baseline and hedge proposals side by side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyCompareRequest"
      responses:
        "200":
          description: Strategy comparison table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyComparison"

components:
  schemas:
    InstrumentType:
      type: string
      enum: [equity, future, option, cash]

    HedgeType:
      type: string
      enum: [none, futuresOverlay, protectivePut, collar, custom]

    Position:
      type: object
      required:
        - instrumentType
        - symbol
        - quantity
        - multiplier
        - markPrice
      properties:
        instrumentType:
          $ref: "#/components/schemas/InstrumentType"
        symbol:
          type: string
        underlying:
          type: string
          nullable: true
        quantity:
          type: number
        multiplier:
          type: number
        markPrice:
          type: number
        expiry:
          type: string
          format: date
          nullable: true
        strike:
          type: number
          nullable: true
        optionType:
          type: string
          enum: [call, put]
          nullable: true
        currency:
          type: string
          nullable: true
        delta:
          type: number
          nullable: true
        gamma:
          type: number
          nullable: true
        vega:
          type: number
          nullable: true
        theta:
          type: number
          nullable: true
        beta:
          type: number
          nullable: true

    BookSnapshot:
      type: object
      required:
        - positions
        - parsingErrors
        - asOf
      properties:
        asOf:
          type: string
          format: date-time
        positions:
          type: array
          items:
            $ref: "#/components/schemas/Position"
        parsingErrors:
          type: array
          items:
            type: string

    ExposureSummary:
      type: object
      required:
        - marketValue
        - grossExposure
        - netExposure
        - delta
        - gamma
        - vega
        - theta
        - beta
      properties:
        marketValue:
          type: number
        grossExposure:
          type: number
        netExposure:
          type: number
        delta:
          type: number
        gamma:
          type: number
        vega:
          type: number
        theta:
          type: number
        beta:
          type: number

    RiskItem:
      type: object
      required: [category, severity, summary]
      properties:
        category:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        summary:
          type: string
        details:
          type: string
          nullable: true

    RiskMap:
      type: object
      required:
        - exposure
        - topRisks
        - concentrationBySymbol
        - concentrationByExpiry
      properties:
        exposure:
          $ref: "#/components/schemas/ExposureSummary"
        topRisks:
          type: array
          items:
            $ref: "#/components/schemas/RiskItem"
        concentrationBySymbol:
          type: array
          items:
            $ref: "#/components/schemas/GroupedExposure"
        concentrationByExpiry:
          type: array
          items:
            $ref: "#/components/schemas/GroupedExposure"

    HedgeProposal:
      type: object
      required:
        - id
        - hedgeType
        - label
        - summary
        - residualExposure
      properties:
        id:
          type: string
        hedgeType:
          $ref: "#/components/schemas/HedgeType"
        label:
          type: string
        summary:
          type: string
        instrument:
          type: string
          nullable: true
        hedgeRatio:
          type: number
          nullable: true
        estimatedCost:
          type: number
          nullable: true
        residualExposure:
          $ref: "#/components/schemas/ExposureSummary"
        notes:
          type: array
          items:
            type: string

    StrategyComparisonRow:
      type: object
      required:
        - proposalId
        - label
        - estimatedCost
        - residualExposure
      properties:
        proposalId:
          type: string
        label:
          type: string
        estimatedCost:
          type: number
        residualExposure:
          $ref: "#/components/schemas/ExposureSummary"
        upsideRetention:
          type: number
          nullable: true
        downsideProtection:
          type: number
          nullable: true
        carryTheta:
          type: number
          nullable: true

    StrategyComparison:
      type: object
      required:
        - baselineExposure
        - rows
      properties:
        baselineExposure:
          $ref: "#/components/schemas/ExposureSummary"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/StrategyComparisonRow"

    BookParseRequest:
      type: object
      required: [positionsInput]
      properties:
        positionsInput:
          type: string
        defaultSymbol:
          type: string
          nullable: true
        snapshot:
          $ref: "#/components/schemas/EnrichedSnapshotFile"

    RiskMapRequest:
      type: object
      required: [book]
      properties:
        book:
          $ref: "#/components/schemas/BookSnapshot"

    HedgeLabRequest:
      type: object
      required: [book]
      properties:
        book:
          $ref: "#/components/schemas/BookSnapshot"
        allowedHedgeTypes:
          type: array
          items:
            $ref: "#/components/schemas/HedgeType"
        target:
          type: string
          nullable: true

    HedgeProposalResponse:
      type: object
      required: [baselineExposure, proposals]
      properties:
        baselineExposure:
          $ref: "#/components/schemas/ExposureSummary"
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/HedgeProposal"

    StrategyCompareRequest:
      type: object
      required: [baselineExposure, proposals]
      properties:
        baselineExposure:
          $ref: "#/components/schemas/ExposureSummary"
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/HedgeProposal"

    ProviderMetadata:
      type: object
      required:
        - id
        - label
        - requiresApiKey
        - supportsSnapshots
        - supportsOptionChain
        - supportsGreeks
        - supportsScenarios
        - notes
      properties:
        id:
          type: string
        label:
          type: string
        requiresApiKey:
          type: boolean
        supportsSnapshots:
          type: boolean
        supportsOptionChain:
          type: boolean
        supportsGreeks:
          type: boolean
        supportsScenarios:
          type: boolean
        notes:
          type: string

    OptionQuote:
      type: object
      required:
        - symbol
        - underlying
        - optionType
        - strike
        - expiry
        - bid
        - ask
        - last
        - volume
        - openInterest
      properties:
        symbol:
          type: string
        underlying:
          type: string
        optionType:
          type: string
          enum: [call, put]
        strike:
          type: number
        expiry:
          type: string
          format: date
        bid:
          type: number
        ask:
          type: number
        last:
          type: number
        volume:
          type: integer
        openInterest:
          type: integer

    EnrichedOptionQuote:
      allOf:
        - $ref: "#/components/schemas/OptionQuote"
        - type: object
          required:
            - mid
            - timeToExpiryYears
            - impliedVol
            - delta
            - gamma
            - vega
            - theta
          properties:
            mid:
              type: number
            timeToExpiryYears:
              type: number
            impliedVol:
              type: number
              nullable: true
            delta:
              type: number
              nullable: true
            gamma:
              type: number
              nullable: true
            vega:
              type: number
              nullable: true
            theta:
              type: number
              nullable: true

    UnderlyingSnapshot:
      type: object
      required: [symbol, spot, currency, timestamp]
      properties:
        symbol:
          type: string
        spot:
          type: number
        currency:
          type: string
        timestamp:
          type: string
          format: date-time

    EnrichedSnapshotFile:
      type: object
      required:
        - source
        - generatedAt
        - riskFreeRate
        - underlying
        - quotes
      properties:
        source:
          type: string
        generatedAt:
          type: string
          format: date-time
        riskFreeRate:
          type: number
        underlying:
          $ref: "#/components/schemas/UnderlyingSnapshot"
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/EnrichedOptionQuote"

    ImportedPosition:
      type: object
      required: [symbol, quantity]
      properties:
        symbol:
          type: string
        quantity:
          type: number

    ParsedPositions:
      type: object
      required: [positions, errors]
      properties:
        positions:
          type: array
          items:
            $ref: "#/components/schemas/ImportedPosition"
        errors:
          type: array
          items:
            type: string

    PortfolioExposure:
      type: object
      required:
        - netDelta
        - netGamma
        - netVega
        - netTheta
        - marketValue
        - unmatchedSymbols
      properties:
        netDelta:
          type: number
        netGamma:
          type: number
        netVega:
          type: number
        netTheta:
          type: number
        marketValue:
          type: number
        unmatchedSymbols:
          type: array
          items:
            type: string

    SpotScenarioPoint:
      type: object
      required: [spot, spotChangePct, portfolioValue, portfolioPnl]
      properties:
        spot:
          type: number
        spotChangePct:
          type: number
        portfolioValue:
          type: number
        portfolioPnl:
          type: number

    VolScenarioPoint:
      type: object
      required: [volShift, portfolioValue, portfolioPnl]
      properties:
        volShift:
          type: number
        portfolioValue:
          type: number
        portfolioPnl:
          type: number

    TimeScenarioPoint:
      type: object
      required: [daysForward, portfolioValue, portfolioPnl]
      properties:
        daysForward:
          type: integer
        portfolioValue:
          type: number
        portfolioPnl:
          type: number

    GroupedExposure:
      type: object
      required:
        - bucket
        - quantity
        - marketValue
        - netDelta
        - netGamma
        - netVega
        - netTheta
      properties:
        bucket:
          type: string
        quantity:
          type: number
        marketValue:
          type: number
        netDelta:
          type: number
        netGamma:
          type: number
        netVega:
          type: number
        netTheta:
          type: number

    AdvisorSuggestion:
      type: object
      required: [risk, action, source]
      properties:
        risk:
          type: string
        action:
          type: string
        source:
          type: string

    AnalysisRequest:
      type: object
      required: [snapshot, positionsInput]
      properties:
        snapshot:
          $ref: "#/components/schemas/EnrichedSnapshotFile"
        positionsInput:
          type: string
        groupByMode:
          type: string
          enum: [symbol, expiry, optionType, symbolExpiry, full]
        advisorMode:
          type: string
          enum: [rules, llm]

    AnalysisResponse:
      type: object
      required:
        - parsedPositions
        - exposure
        - spotScenarios
        - volScenarios
        - timeScenarios
        - groupedExposures
        - advisor
      properties:
        parsedPositions:
          $ref: "#/components/schemas/ParsedPositions"
        exposure:
          $ref: "#/components/schemas/PortfolioExposure"
        spotScenarios:
          type: array
          items:
            $ref: "#/components/schemas/SpotScenarioPoint"
        volScenarios:
          type: array
          items:
            $ref: "#/components/schemas/VolScenarioPoint"
        timeScenarios:
          type: array
          items:
            $ref: "#/components/schemas/TimeScenarioPoint"
        groupedExposures:
          type: array
          items:
            $ref: "#/components/schemas/GroupedExposure"
        advisor:
          type: object
          required: [source, suggestions]
          properties:
            source:
              type: string
            suggestions:
              type: array
              items:
                $ref: "#/components/schemas/AdvisorSuggestion"
