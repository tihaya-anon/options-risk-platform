services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 8787
      DATA_PROVIDER: mock
      DEFAULT_SYMBOL: SPY
      RISK_FREE_RATE: 0.045
      LLM_ADVISOR_MODE: disabled
    ports:
      - "8787:8787"
